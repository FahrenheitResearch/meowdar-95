<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BowEcho Palette Render Example</title>
    <style>
      body {
        margin: 20px;
        background: #101214;
        color: #eef2f4;
        font: 14px system-ui, sans-serif;
      }

      main {
        display: grid;
        gap: 12px;
      }

      header {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      button {
        min-height: 32px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, 384px);
        gap: 12px;
        overflow-x: auto;
      }

      figure {
        margin: 0;
      }

      canvas {
        width: 384px;
        height: 384px;
        background: #030606;
        border: 1px solid #3b464d;
      }

      figcaption,
      pre {
        color: #cbd4d8;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <button id="load">Load default + custom palette</button>
      </header>
      <div class="grid">
        <figure>
          <canvas id="default" width="384" height="384"></canvas>
          <figcaption>default BowEcho palette</figcaption>
        </figure>
        <figure>
          <canvas id="custom" width="384" height="384"></canvas>
          <figcaption>custom imported .pal</figcaption>
        </figure>
      </div>
      <pre id="status">ready</pre>
    </main>

    <script type="module">
      import {
        createRadarToolbox,
        drawFrameToCanvas,
      } from "../radar-toolbox.js";

      const toolbox = createRadarToolbox();
      const els = {
        load: document.getElementById("load"),
        status: document.getElementById("status"),
        defaultCanvas: document.getElementById("default"),
        customCanvas: document.getElementById("custom"),
      };

      const palette = toolbox.parsePalette(`
Product: BR
Units: dBZ
Step: 10
RF: 82 21 86 245
Color4: -20 0 0 0 0
Color: 0 25 25 25
Color: 15 0 180 255
Color: 30 0 255 110
Color: 45 255 235 0
Color: 60 255 60 0
Color: 75 255 0 220
`, { name: "Browser REF Proof" });

      els.load.addEventListener("click", load);
      load();

      async function load() {
        els.load.disabled = true;
        try {
          els.status.textContent = "loading default loop";
          const loop = await toolbox.loadLoop({
            site: "KTLX",
            mode: "live",
            product: "REF",
            frameCount: 3,
            width: 384,
            height: 384,
            rangeKm: 230,
          });
          const defaultFrame = loop.frame(loop.length - 1);
          drawFrameToCanvas(els.defaultCanvas, defaultFrame);

          els.status.textContent = "rerendering with imported palette";
          const customLoop = await toolbox.rerenderLoop(loop, { palette });
          const customFrame = customLoop.frame(customLoop.length - 1);
          drawFrameToCanvas(els.customCanvas, customFrame);
          els.status.textContent = [
            `${loop.site} ${loop.product} ${defaultFrame.frame.volumeTime || defaultFrame.frame.id}`,
            `default render ${Math.round(defaultFrame.elapsedMs)} ms cache=${defaultFrame.cacheHit}`,
            `custom render ${Math.round(customFrame.elapsedMs)} ms cache=${customFrame.cacheHit}`,
            `palette ${customFrame.renderOptions.paletteFamily} ${customFrame.renderOptions.paletteKey}`,
            `${customFrame.width}x${customFrame.height} exact backing pixels`,
          ].join("\\n");
        } catch (error) {
          els.status.textContent = String(error.message || error);
        } finally {
          els.load.disabled = false;
        }
      }
    </script>
  </body>
</html>
