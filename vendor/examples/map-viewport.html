<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BowEcho Map Viewport Contract</title>
    <style>
      :root {
        color-scheme: light;
        --panel: #c0c0c0;
        --panel-light: #ffffff;
        --panel-dark: #555555;
        --ink: #050505;
        --blue: #000080;
        --cyan: #008080;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--cyan);
        color: var(--ink);
        font: 13px "MS Sans Serif", Tahoma, system-ui, sans-serif;
      }

      main {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr auto;
        padding: 10px;
        gap: 8px;
      }

      .window {
        background: var(--panel);
        border: 2px solid;
        border-color: var(--panel-light) var(--panel-dark) var(--panel-dark) var(--panel-light);
        box-shadow: 1px 1px 0 #000000;
      }

      .titlebar {
        min-height: 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 3px 5px;
        background: var(--blue);
        color: #ffffff;
        font-weight: 700;
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
        padding: 8px;
      }

      button,
      select {
        min-height: 26px;
        border: 2px solid;
        border-color: var(--panel-light) var(--panel-dark) var(--panel-dark) var(--panel-light);
        background: var(--panel);
        color: var(--ink);
        font: inherit;
      }

      button {
        min-width: 28px;
        padding: 2px 8px;
      }

      button:active {
        border-color: var(--panel-dark) var(--panel-light) var(--panel-light) var(--panel-dark);
        padding: 3px 7px 1px 9px;
      }

      select {
        min-width: 210px;
      }

      .map-wrap {
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
        gap: 8px;
      }

      .canvas-panel {
        min-width: 0;
        min-height: 0;
        padding: 6px;
      }

      canvas {
        display: block;
        width: 100%;
        height: min(68vh, 680px);
        min-height: 420px;
        background: #11181a;
        image-rendering: pixelated;
        border: 2px solid;
        border-color: var(--panel-dark) var(--panel-light) var(--panel-light) var(--panel-dark);
      }

      aside {
        min-width: 0;
        padding: 8px;
        overflow: hidden;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        max-height: calc(min(68vh, 680px) + 12px);
        overflow: auto;
        padding: 8px;
        background: #ffffff;
        border: 2px solid;
        border-color: var(--panel-dark) var(--panel-light) var(--panel-light) var(--panel-dark);
      }

      .statusbar {
        padding: 5px 8px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      @media (max-width: 900px) {
        main {
          padding: 6px;
        }

        .map-wrap {
          grid-template-columns: 1fr;
        }

        canvas {
          min-height: 360px;
          height: 58vh;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="window">
        <div class="titlebar">
          <span>BowEcho Map Viewport Contract</span>
          <span id="titleSite">KTLX</span>
        </div>
        <div class="toolbar">
          <select id="site"></select>
          <button id="fit">Fit</button>
          <button id="zoomIn">+</button>
          <button id="zoomOut">-</button>
          <button id="panLeft">Left</button>
          <button id="panRight">Right</button>
          <button id="panUp">Up</button>
          <button id="panDown">Down</button>
        </div>
      </section>

      <section class="map-wrap">
        <div class="window canvas-panel">
          <canvas id="map" width="1100" height="680"></canvas>
        </div>
        <aside class="window">
          <pre id="status"></pre>
        </aside>
      </section>

      <footer class="window statusbar">
        <span id="viewReadout"></span>
        <span id="tileReadout"></span>
      </footer>
    </main>

    <script type="module">
      import {
        RADAR_SITES,
        fitMapViewToLayer,
        lonLatToWorldPixel,
        mapTileCover,
        normalizeMapView,
        panMapView,
        radarLayerQuadMesh,
        radarTextureLayer,
        zoomMapView,
      } from "../radar-toolbox.js?v=mapview1";

      const els = {
        site: document.getElementById("site"),
        fit: document.getElementById("fit"),
        zoomIn: document.getElementById("zoomIn"),
        zoomOut: document.getElementById("zoomOut"),
        panLeft: document.getElementById("panLeft"),
        panRight: document.getElementById("panRight"),
        panUp: document.getElementById("panUp"),
        panDown: document.getElementById("panDown"),
        map: document.getElementById("map"),
        status: document.getElementById("status"),
        titleSite: document.getElementById("titleSite"),
        viewReadout: document.getElementById("viewReadout"),
        tileReadout: document.getElementById("tileReadout"),
      };
      const ctx = els.map.getContext("2d");
      let siteId = "KTLX";
      let layer = makeLayer(siteId);
      let view = null;
      let visibleSitePoints = [];

      for (const site of RADAR_SITES) {
        const option = document.createElement("option");
        option.value = site.id;
        option.textContent = `${site.id} ${site.name}`;
        option.selected = site.id === siteId;
        els.site.appendChild(option);
      }

      els.site.addEventListener("change", () => selectSite(els.site.value, true));
      els.fit.addEventListener("click", () => {
        view = fitMapViewToLayer(layer, mapOptions());
        draw();
      });
      els.zoomIn.addEventListener("click", () => {
        view = zoomMapView(view, 0.5);
        draw();
      });
      els.zoomOut.addEventListener("click", () => {
        view = zoomMapView(view, -0.5);
        draw();
      });
      els.panLeft.addEventListener("click", () => {
        view = panMapView(view, { dx: -120 });
        draw();
      });
      els.panRight.addEventListener("click", () => {
        view = panMapView(view, { dx: 120 });
        draw();
      });
      els.panUp.addEventListener("click", () => {
        view = panMapView(view, { dy: -120 });
        draw();
      });
      els.panDown.addEventListener("click", () => {
        view = panMapView(view, { dy: 120 });
        draw();
      });
      els.map.addEventListener("click", onMapClick);
      window.addEventListener("resize", resizeCanvas);
      resizeCanvas();

      function resizeCanvas() {
        const rect = els.map.getBoundingClientRect();
        const width = Math.max(420, Math.round(rect.width));
        const height = Math.max(360, Math.round(rect.height));
        if (els.map.width !== width || els.map.height !== height) {
          els.map.width = width;
          els.map.height = height;
          view = view
            ? normalizeMapView({ ...view, width, height })
            : fitMapViewToLayer(layer, mapOptions());
        }
        if (!view) view = fitMapViewToLayer(layer, mapOptions());
        draw();
      }

      function mapOptions() {
        return {
          width: els.map.width,
          height: els.map.height,
          padding: 70,
          minZoom: 2,
          maxZoom: 12,
        };
      }

      function selectSite(nextSiteId, fit) {
        siteId = nextSiteId;
        layer = makeLayer(siteId);
        if (fit) view = fitMapViewToLayer(layer, mapOptions());
        els.site.value = siteId;
        draw();
      }

      function makeLayer(nextSiteId) {
        const rgba = syntheticRadarRgba(512, 512);
        return radarTextureLayer({
          width: 512,
          height: 512,
          rgba,
          frame: {
            id: `${nextSiteId}-synthetic`,
            cacheKey: `${nextSiteId}:synthetic:512`,
            source: "local-synthetic",
            volumeTime: "2026-06-13T00:00:00Z",
            size: rgba.byteLength,
          },
          meta: { site: nextSiteId },
          renderOptions: {
            site: nextSiteId,
            product: "REF",
            cut: 0,
            width: 512,
            height: 512,
            rangeKm: 230,
            smoothing: "native",
          },
          elapsedMs: 0,
          cacheHit: true,
          imageData: null,
        }, { site: nextSiteId });
      }

      function syntheticRadarRgba(width, height) {
        const rgba = new Uint8ClampedArray(width * height * 4);
        const cx = width * 0.5;
        const cy = height * 0.5;
        for (let y = 0; y < height; y += 1) {
          for (let x = 0; x < width; x += 1) {
            const dx = x - cx;
            const dy = y - cy;
            const range = Math.hypot(dx, dy) / (width * 0.5);
            if (range > 0.96) continue;
            const wave = Math.sin(dx * 0.055) + Math.cos(dy * 0.045) + Math.sin((dx + dy) * 0.025);
            const storm = Math.max(0, 1 - Math.hypot(dx - 88, dy + 62) / 145);
            const band = Math.max(0, 1 - Math.abs(range - 0.48) * 8);
            const signal = Math.max(0, storm * 1.25 + band * 0.45 + wave * 0.12);
            if (signal < 0.08) continue;
            const offset = (y * width + x) * 4;
            rgba[offset] = Math.min(255, 25 + signal * 210);
            rgba[offset + 1] = Math.min(255, 90 + band * 120 + signal * 80);
            rgba[offset + 2] = Math.max(20, 190 - signal * 150);
            rgba[offset + 3] = Math.min(230, 60 + signal * 220);
          }
        }
        return rgba;
      }

      function draw() {
        const cover = mapTileCover(view);
        const mesh = radarLayerQuadMesh(layer, view);
        ctx.clearRect(0, 0, els.map.width, els.map.height);
        drawBackground();
        drawTiles(cover);
        drawSites();
        drawRadar(mesh);
        drawCrosshair();
        window.__bowechoMapViewport = {
          selectedSite: siteId,
          visibleSites: visibleSitePoints,
          view,
        };
        els.titleSite.textContent = siteId;
        els.viewReadout.textContent = `center ${view.center.lon.toFixed(3)}, ${view.center.lat.toFixed(3)} z${view.zoom.toFixed(2)}`;
        els.tileReadout.textContent = `${cover.count} tiles at z${cover.z}`;
        els.status.textContent = JSON.stringify({
          selectedSite: siteId,
          view: {
            type: view.type,
            width: view.width,
            height: view.height,
            zoom: Number(view.zoom.toFixed(3)),
            bounds: roundBounds(view.bounds),
            antimeridian: view.antimeridian,
          },
          tileCover: {
            type: cover.type,
            count: cover.count,
            firstTile: cover.tiles[0],
          },
          visibleSites: visibleSitePoints.slice(0, 32).map((site) => ({
            id: site.id,
            x: Number(site.x.toFixed(2)),
            y: Number(site.y.toFixed(2)),
          })),
          quadMesh: {
            type: mesh.type,
            imageBytes: mesh.image.rgba.byteLength,
            vertices: mesh.vertices.map((vertex) => ({
              corner: vertex.corner,
              screen: vertex.screen.map((value) => Number(value.toFixed(2))),
              uv: vertex.uv,
            })),
            indices: mesh.indices,
          },
        }, null, 2);
      }

      function drawBackground() {
        const gradient = ctx.createLinearGradient(0, 0, 0, els.map.height);
        gradient.addColorStop(0, "#122629");
        gradient.addColorStop(1, "#091113");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, els.map.width, els.map.height);
      }

      function drawTiles(cover) {
        ctx.save();
        ctx.lineWidth = 1;
        ctx.strokeStyle = "rgba(255,255,255,0.16)";
        ctx.fillStyle = "rgba(255,255,255,0.62)";
        ctx.font = "11px Tahoma, sans-serif";
        for (const tile of cover.tiles) {
          const nw = projectRawLonLat(tile.bounds.unwrappedWest, tile.bounds.north);
          const se = projectRawLonLat(tile.bounds.unwrappedEast, tile.bounds.south);
          const left = Math.min(nw.x, se.x);
          const top = Math.min(nw.y, se.y);
          const width = Math.abs(se.x - nw.x);
          const height = Math.abs(se.y - nw.y);
          ctx.strokeRect(left, top, width, height);
          ctx.fillText(tile.key, left + 6, top + 15);
        }
        ctx.restore();
      }

      function drawSites() {
        ctx.save();
        visibleSitePoints = [];
        for (const site of RADAR_SITES) {
          const point = projectLonLat(site.lon, site.lat);
          if (point.x < -20 || point.y < -20 || point.x > els.map.width + 20 || point.y > els.map.height + 20) continue;
          visibleSitePoints.push({
            id: site.id,
            name: site.name,
            x: point.x,
            y: point.y,
          });
          const selected = site.id === siteId;
          ctx.beginPath();
          ctx.arc(point.x, point.y, selected ? 5 : 3, 0, Math.PI * 2);
          ctx.fillStyle = selected ? "#ffff00" : "rgba(238,238,238,0.72)";
          ctx.strokeStyle = "#050505";
          ctx.lineWidth = selected ? 2 : 1;
          ctx.fill();
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawRadar(mesh) {
        const vertices = mesh.vertices;
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(vertices[0].screen[0], vertices[0].screen[1]);
        for (let index = 1; index < vertices.length; index += 1) {
          ctx.lineTo(vertices[index].screen[0], vertices[index].screen[1]);
        }
        ctx.closePath();
        const fill = ctx.createLinearGradient(vertices[0].screen[0], vertices[0].screen[1], vertices[2].screen[0], vertices[2].screen[1]);
        fill.addColorStop(0, "rgba(10, 220, 255, 0.10)");
        fill.addColorStop(0.45, "rgba(255, 210, 40, 0.20)");
        fill.addColorStop(1, "rgba(255, 60, 60, 0.16)");
        ctx.fillStyle = fill;
        ctx.strokeStyle = "#ffff00";
        ctx.lineWidth = 2;
        ctx.fill();
        ctx.stroke();

        const center = projectLonLat(layer.center.lon, layer.center.lat);
        ctx.beginPath();
        ctx.arc(center.x, center.y, 9, 0, Math.PI * 2);
        ctx.fillStyle = "#000000";
        ctx.fill();
        ctx.strokeStyle = "#ffff00";
        ctx.stroke();
        ctx.fillStyle = "#ffffff";
        ctx.font = "700 12px Tahoma, sans-serif";
        ctx.fillText(siteId, center.x + 12, center.y + 4);
        ctx.restore();
      }

      function drawCrosshair() {
        ctx.save();
        ctx.strokeStyle = "rgba(255,255,255,0.22)";
        ctx.beginPath();
        ctx.moveTo(els.map.width * 0.5 - 10, els.map.height * 0.5);
        ctx.lineTo(els.map.width * 0.5 + 10, els.map.height * 0.5);
        ctx.moveTo(els.map.width * 0.5, els.map.height * 0.5 - 10);
        ctx.lineTo(els.map.width * 0.5, els.map.height * 0.5 + 10);
        ctx.stroke();
        ctx.restore();
      }

      function onMapClick(event) {
        const rect = els.map.getBoundingClientRect();
        const x = ((event.clientX - rect.left) / rect.width) * els.map.width;
        const y = ((event.clientY - rect.top) / rect.height) * els.map.height;
        let nearest = null;
        for (const site of RADAR_SITES) {
          const point = projectLonLat(site.lon, site.lat);
          const distance = Math.hypot(point.x - x, point.y - y);
          if (distance <= 14 && (!nearest || distance < nearest.distance)) nearest = { site, distance };
        }
        if (nearest) selectSite(nearest.site.id, true);
      }

      function projectLonLat(lon, lat) {
        const world = lonLatToWorldPixel(lon, lat, { zoom: view.zoom, tileSize: view.tileSize });
        const x = unwrapWorldX(world.x, view.center.world.x, view.worldSize);
        return {
          x: x - view.center.world.x + view.width * 0.5,
          y: world.y - view.center.world.y + view.height * 0.5,
        };
      }

      function projectRawLonLat(lon, lat) {
        const world = lonLatToWorldPixel(lon, lat, { zoom: view.zoom, tileSize: view.tileSize });
        let x = world.x;
        const normalized = ((lon + 180) / 360) * view.worldSize;
        if (Number.isFinite(normalized)) x = normalized;
        x = unwrapWorldX(x, view.center.world.x, view.worldSize);
        return {
          x: x - view.center.world.x + view.width * 0.5,
          y: world.y - view.center.world.y + view.height * 0.5,
        };
      }

      function unwrapWorldX(x, referenceX, worldSize) {
        let next = x;
        while (next - referenceX > worldSize * 0.5) next -= worldSize;
        while (referenceX - next > worldSize * 0.5) next += worldSize;
        return next;
      }

      function roundBounds(bounds) {
        return {
          west: Number(bounds.west.toFixed(4)),
          south: Number(bounds.south.toFixed(4)),
          east: Number(bounds.east.toFixed(4)),
          north: Number(bounds.north.toFixed(4)),
        };
      }
    </script>
  </body>
</html>
